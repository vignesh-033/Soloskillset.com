<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soloskillset Platform</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
:root {
  --space-dark: #050510;
  --space-purple: #6a00ff;
  --space-blue: #00d4ff;
  --space-pink: #ff00cc;
  --star-glow: 0 0 10px #00d4ff, 0 0 20px #6a00ff;
  --primary-color: #4CAF50;
  --secondary-color: #81C784;
  --button-bg: #4CAF50;
  --button-text: #fff;
  --card-bg: #fff;
  --text-color: #111;
}
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6fb;
  overflow-x: hidden;
}
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 15px 0;
}
.dash-card {
  background: #f9fafb;
  color: #111;
  border: 1px solid #e5e7eb;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}
.dash-card b { font-size: 22px; color: #00aa66; }
.dash-section {
  background: #f0f8ff;
  border: 1px solid #4CAF50;
  border-radius: 6px;
  padding: 8px;
  width: 100%;
  margin: 5px 0;
  color: #111;
  box-sizing: border-box;
}
.page { display: none; padding: 10px 15px 80px; }
.page.active { display: block; }
input, textarea, button {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
button:hover { background: #388e3c; }
textarea { resize: none; }
.card { background: var(--card-bg); padding: 10px; border-radius: 8px; margin: 8px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: white;
  border-top: 1px solid #ddd;
  padding: 10px 0;
  box-sizing: border-box;
  z-index: 100;
}
.icon {
  text-align: center;
  font-size: 12px;
  color: #333;
  cursor: pointer;
  transition: transform 0.3s, color 0.3s;
  flex-grow: 1;
  margin: 0;
  position: relative;
  overflow: visible;
}
.icon i { font-size: 22px; transition: transform 0.3s, color 0.3s; }
.icon span { display: block; margin-top: 2px; }
.icon:hover i { transform: rotateX(20deg) rotateY(10deg) scale(1.2); color: #B8860B; }
.icon:hover span { color: #B8860B; }
.icon.active i, .icon.active span { color: #B8860B; transform: scale(1.1); }
.drag-drop { border: 2px dashed #4CAF50; padding: 20px; text-align: center; margin: 5px 0; cursor: pointer; border-radius: 6px; }
.drag-drop.dragover { background: #e0ffe0; }
.maze-grid { display: grid; grid-template-columns: repeat(6, 50px); gap: 4px; }
.maze-cell { width: 50px; height: 50px; background: #eee; border-radius: 8px; }
.wall { background: #333; }
.start { background: #4caf50; }
.end { background: #f44336; }
.path { background: #ff9800; }
#puzzleBoard { display: grid; grid-template-columns: repeat(3, 100px); gap: 6px; }
.piece { width: 100px; height: 100px; background-size: 300px 300px; cursor: pointer; }
#hanoi { display: flex; gap: 20px; position: relative; }
.rod { width: 120px; height: 200px; border: 2px solid #555; display: flex; flex-direction: column-reverse; align-items: center; position: relative; }
.disk { height: 24px; margin: 3px; border-radius: 6px; cursor: grab; }
.profile-container { background: #fff; border-radius: 14px; overflow: visible; box-shadow: 0 4px 20px rgba(0,0,0,.1); position: relative; }
.profile-wall { height: 180px; background-size: cover; background-position: center; background-color: #ccc; position: relative; border-radius: 14px 14px 0 0; overflow: hidden; }
.wall-drop { position: absolute; inset: 0; background: rgba(0,0,0,.45); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0; cursor: pointer; transition: .3s; }
.profile-wall:hover .wall-drop { opacity: 1; }
.dp-box { margin-top: -60px; text-align: center; position: relative; z-index: 2; }
.dp-wrapper { width: 120px; height: 120px; margin: auto; border-radius: 50%; border: 4px solid #fff; background: #eee; overflow: hidden; position: relative; }
.dp-wrapper img { width: 100%; height: 100%; object-fit: cover; }
.dp-drop { position: absolute; inset: 0; background: rgba(0,0,0,.55); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; opacity: 0; cursor: pointer; border-radius: 50%; }
.dp-wrapper:hover .dp-drop { opacity: 1; }
.profile-info { padding: 15px; text-align: center; }
.profile-info h3 { margin: 6px 0; }
.profile-info p { margin: 2px 0; color: #555; font-size: 14px; }
.setting-panel { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; margin-top: 12px; }
.setting-panel div { padding: 12px; border-bottom: 1px solid #e5e7eb; cursor: pointer; }
.setting-panel div:last-child { border-bottom: none; }
.setting-panel div:hover { background: #eef2ff; }
.settings-icon { position: absolute; top: 12px; right: 12px; font-size: 20px; background: #fff; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.2); cursor: pointer; z-index: 30; }
.settings-menu { position: absolute; top: 58px; right: 12px; background: #fff; width: 220px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.2); overflow: hidden; display: none; z-index: 40; }
.profile-container { overflow: visible !important; }
.settings-menu div { padding: 12px 14px; font-size: 14px; cursor: pointer; display: flex; gap: 10px; align-items: center; }
.settings-menu div:hover { background: #f1f5f9; }
.profile-sections { padding: 16px; display: grid; gap: 20px; }
.pro-box { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.pro-box h4 { margin-bottom: 8px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.pro-box p { font-size: 14px; color: #444; }
.skill-tags { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
.skill-tags span, .skill-chip { background: #eef2ff; padding: 6px 10px; border-radius: 20px; font-size: 12px; display: inline-block; }
.user-post { border-bottom: 1px solid #eee; padding: 10px 0; }
.user-post:last-child { border: none; }
.editable { cursor: pointer; }
.editable:hover { background: #eef2ff; }
.edit-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
.my-posts-scroll { max-height: 250px; overflow-y: auto; padding-right: 8px; }
.post-card { background: #f8f9ff; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
.post-card small { color: #777; font-size: 12px; }
.profile-posts-wrapper { height: 220px; overflow: hidden; }
.profile-posts-scroll { height: 100%; overflow-y: auto; padding-right: 6px; -webkit-overflow-scrolling: touch; }
.post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; cursor: pointer; }
.post-header img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid #A9750B; }
.post-username { font-weight: bold; color: #1C6E20; }
input:focus, textarea:focus { outline: none; border: 2px solid var(--space-blue); box-shadow: 0 0 10px var(--space-blue), 0 0 25px var(--space-purple); background: rgba(0,0,30,0.05); caret-color: var(--space-blue); }
.icon.active::before { content: ""; position: absolute; width: 55px; height: 55px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); background: conic-gradient(#00d4ff,#6a00ff,#ff00cc,#00d4ff); filter: blur(10px); opacity: 0.5; animation: spinGalaxy 4s linear infinite; z-index: -1; }
@keyframes spinGalaxy { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } }
.orbit { position: absolute; width: 60px; height: 60px; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; opacity: 0; }
.icon.active .orbit { opacity: 1; animation: rotateOrbit 6s linear infinite; }
.planet { position: absolute; width: 8px; height: 8px; background: #00ffff; border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 8px #00d4ff, 0 0 15px #ff00cc; }
@keyframes rotateOrbit { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } }
.icon::after { content: ""; position: absolute; width: 40px; height: 10px; background: linear-gradient(90deg,#00d4ff,transparent); top: 50%; left: -50px; transform: translateY(-50%); opacity: 0; }
.icon.active::after { animation: trailMove 0.6s ease; }
@keyframes trailMove { 0% { left: -50px; opacity: 1; } 100% { left: 50px; opacity: 0; } }
a, h1, h2, h3, h4, h5, h6 { color: var(--primary-color); }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginErr" style="color:red;font-size:13px;"></div>
  <button onclick="loginUser()">Login</button>
  <p onclick="showRegister()" style="cursor:pointer;color:blue;">No account? Register</p>
</div>

<!-- REGISTER PAGE -->
<div id="registerPage" class="page">
  <h2>Register</h2>
  <input id="regName" placeholder="Full Name">
  <input id="regCollege" placeholder="College / Company">
  <input id="regEmail" placeholder="Email">
  <input id="regPhone" placeholder="Phone (10 digits)">
  <input id="regPass" type="password" placeholder="Password">
  <small>Password: 1 uppercase, 1 number, 1 special, minimum 10 chars</small>
  <div id="regErr" style="color:red;font-size:13px;"></div>
  <button onclick="registerUser()">Register</button>
  <p onclick="showLogin()" style="cursor:pointer;color:blue;">Already have account? Login</p>
</div>

<!-- APP PAGE -->
<div id="appPage" class="page">
  <h2>Soloskillset Platform</h2>
  <div id="content"></div>
  <nav>
    <div class="icon" id="navHome" onclick="openPage('home')"><div class="orbit"><div class="planet"></div></div><i class="fas fa-house"></i><span>Home</span></div>
    <div class="icon" id="navInternship" onclick="openPage('internship')"><div class="orbit"><div class="planet"></div></div><i class="fas fa-briefcase"></i><span>Internship</span></div>
    <div class="icon" id="navPost" onclick="openPage('post')"><div class="orbit"><div class="planet"></div></div><i class="fas fa-plus-circle"></i><span>Post</span></div>
    <div class="icon" id="navCertificate" onclick="openPage('certificate')"><div class="orbit"><div class="planet"></div></div><i class="fas fa-certificate"></i><span>Certificate</span></div>
    <div class="icon" id="adminDashBtn" style="display:none" onclick="renderAdminDashboard()"><div class="orbit"><div class="planet"></div></div><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
    <div class="icon" id="navProfile" onclick="openPage('profile')"><div class="orbit"><div class="planet"></div></div><i class="fas fa-user-circle"></i><span>Profile</span></div>
  </nav>
</div>

<script>
let mediaDB;
let dbReady = false;
const videoURLCache = {};
const dbReq = indexedDB.open("MediaDB", 1);
dbReq.onupgradeneeded = e => { mediaDB = e.target.result; mediaDB.createObjectStore("media", { keyPath: "id" }); };
dbReq.onsuccess = e => {
  mediaDB = e.target.result; dbReady = true;
  if (currentUser && currentUser.role === 'admin') document.getElementById('adminDashBtn').style.display = 'flex';
  if (document.getElementById('appPage').classList.contains('active')) openPage('home');
};
function saveMediaToDB(id, blob) {
  return new Promise(resolve => { const tx = mediaDB.transaction("media","readwrite"); tx.objectStore("media").put({id,blob}); tx.oncomplete = () => resolve(); });
}
function getMediaFromDB(id) {
  return new Promise(resolve => { const tx = mediaDB.transaction("media","readonly"); const req = tx.objectStore("media").get(id); req.onsuccess = () => resolve(req.result?.blob || null); });
}
const defaultUsers = {
  "admin@soloskillset.com": { name:"Admin", college:"Soloskillset", email:"admin@soloskillset.com", phone:"9999999999", pass:"Admin@12345", role:"admin", verified:true, followers:[], following:[], certificates:[], savedPosts:[], likedPosts:[], commentedPosts:[] }
};
const savedUsers = JSON.parse(localStorage.getItem('users') || '{}');
const users = { ...savedUsers, ...defaultUsers };
let currentUser = null;
let posts = JSON.parse(localStorage.getItem('posts') || '[]');
let adminInternships = JSON.parse(localStorage.getItem('adminInternships') || '[]');

function showLogin() { document.getElementById('loginPage').classList.add('active'); document.getElementById('registerPage').classList.remove('active'); }
function showRegister() { document.getElementById('loginPage').classList.remove('active'); document.getElementById('registerPage').classList.add('active'); }

async function openPage(id) {
  document.getElementById('appPage').classList.add('active');
  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('registerPage').classList.remove('active');
  document.getElementById('content').innerHTML = '';
  document.querySelectorAll('nav .icon').forEach(d => d.classList.remove('active'));
  const navEl = document.getElementById('nav' + capitalize(id));
  if (navEl) navEl.classList.add('active');
  if (id === 'home') { if (!dbReady) { document.getElementById('content').innerHTML = '<p>Loading feed...</p>'; return; } renderPosts(); }
  if (id === 'post') renderPostBox();
  if (id === 'certificate') renderCertificate();
  if (id === 'profile') renderProfile();
  if (id === 'internship') renderInternship();
  if (id === 'adminDashboard') { renderAdminDashboard(); return; }
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function loginUser() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (users[email] && users[email].pass === pass) {
    currentUser = users[email];
    currentUser.education ||= "Add your school / college / company";
    currentUser.skills ||= ["HTML","CSS"];
    currentUser.certificates ||= [];
    localStorage.setItem('currentUser', email);
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('appPage').classList.add('active');
    if (currentUser.role === "admin") {
      alert("Admin login successful!");
      document.getElementById('adminDashBtn').style.display = 'flex';
      if (!localStorage.getItem('adminDashboardShown')) { renderAdminDashboard(); localStorage.setItem('adminDashboardShown','true'); }
    } else { alert("Login successful!"); openPage('home'); }
  } else { document.getElementById('loginErr').innerText = "Invalid login"; }
}

const SHEET_URL = "https://script.google.com/macros/s/AKfycbxhrZh0LiUDxP31ndRg4vCuzSTyqyJwm41KXmfNoXAdxNVTjlKY7GESatxIclNa-92R/exec";

function registerUser() {
  const name = document.getElementById('regName').value.trim();
  const college = document.getElementById('regCollege').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  if (!/^\S+@\S+\.\S+$/.test(email)) { alert("Invalid email"); return; }
  if (!/^\d{10}$/.test(phone)) { alert("Invalid phone"); return; }
  if (users[email]) { alert("Email already registered"); return; }
  users[email] = { name, college, email, phone, pass, role:"user", verified:true, followers:[], following:[], certificates:[], savedPosts:[], likedPosts:[], commentedPosts:[], education:college, skills:[] };
  localStorage.setItem('users', JSON.stringify(users));
  fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,college,email,phone,role:"user"}) }).catch(err => console.warn("Sheet sync failed:",err));
  alert("Registered successfully! You can login now.");
  showLogin();
}

async function renderPosts() {
  const content = document.getElementById('content');
  content.innerHTML = '<h3>Home Feed</h3><div id="feed"></div>';
  if (posts.length === 0) { content.innerHTML += '<p>No posts yet</p>'; return; }
  for (let i = 0; i < posts.length; i++) {
    const p = posts[i];
    let mediaHTML = '';
    for (const m of p.media || []) {
      if (m.type === "image") mediaHTML += `<img src="${m.src}" width="100%" style="border-radius:8px;margin:5px 0">`;
      if (m.type === "audio") mediaHTML += `<audio src="${m.src}" controls style="width:100%;margin:5px 0"></audio>`;
      if (m.type === "video") { const blob = await getMediaFromDB(m.dbId); if (blob) { if (!videoURLCache[m.dbId]) videoURLCache[m.dbId] = URL.createObjectURL(blob); mediaHTML += `<video src="${videoURLCache[m.dbId]}" controls playsinline preload="metadata" width="100%" style="border-radius:8px;margin:5px 0"></video>`; } }
    }
    const postUser = Object.values(users).find(u => u.name === p.user);
    content.innerHTML += `<div class="card" id="post-${i}"><div class="post-header" onclick="openUserProfile('${postUser?.email}')"><img src="${postUser?.dp || 'https://via.placeholder.com/40'}"><span class="post-username">${p.user}</span></div><div>${p.text}</div><div id="media-${i}">${mediaHTML}</div><div id="actions-${i}"></div><div id="comments-${i}"></div></div>`;
    updatePostActions(i); updateComments(i);
  }
}

function updatePostActions(i) {
  const p = posts[i]; const liked = currentUser.likedPosts?.includes(i); const saved = currentUser.savedPosts?.includes(i);
  const box = document.getElementById(`actions-${i}`); if (!box) return;
  box.innerHTML = `<button onclick="toggleLike(${i})">${liked?'❤️ Liked':'🤍 Like'} (${p.likes.length})</button><button onclick="addComment(${i})">Comment</button><button onclick="savePost(${i})">${saved?'Unsave':'Save'}</button>`;
}
function toggleLike(i) {
  posts[i].likes = posts[i].likes || []; currentUser.likedPosts = currentUser.likedPosts || [];
  const idx = posts[i].likes.indexOf(currentUser.email);
  if (idx > -1) { posts[i].likes.splice(idx,1); currentUser.likedPosts = currentUser.likedPosts.filter(p => p !== i); }
  else { posts[i].likes.push(currentUser.email); currentUser.likedPosts.push(i); }
  users[currentUser.email] = currentUser; localStorage.setItem("users",JSON.stringify(users)); localStorage.setItem("posts",JSON.stringify(posts)); updatePostActions(i);
}
function savePost(i) {
  currentUser.savedPosts = currentUser.savedPosts || []; const idx = currentUser.savedPosts.indexOf(i);
  if (idx > -1) currentUser.savedPosts.splice(idx,1); else currentUser.savedPosts.push(i);
  users[currentUser.email] = currentUser; localStorage.setItem("users",JSON.stringify(users)); updatePostActions(i);
}
function addComment(postIndex, text) {
  if (!text) { text = prompt("Enter comment:"); if (!text) return; }
  posts[postIndex].comments = posts[postIndex].comments || [];
  posts[postIndex].comments.push({ user:currentUser.name, email:currentUser.email, text });
  currentUser.commentedPosts = currentUser.commentedPosts || []; currentUser.commentedPosts.push({ postIndex, text });
  users[currentUser.email] = currentUser; localStorage.setItem('users',JSON.stringify(users)); localStorage.setItem('posts',JSON.stringify(posts)); updateComments(postIndex);
}
function updateComments(postIndex) {
  const box = document.getElementById(`comments-${postIndex}`); if (!box) return; box.innerHTML = '';
  (posts[postIndex].comments || []).forEach((c, commentIndex) => {
    const isOwner = c.email === currentUser.email;
    box.innerHTML += `<div style="margin-left:10px;font-size:13px;color:#555;display:flex;justify-content:space-between;align-items:center;"><div><b>${c.user}:</b> ${c.text}</div>${isOwner?`<div style="display:flex;gap:6px;"><span onclick="editComment(${postIndex},${commentIndex})" style="cursor:pointer;color:blue;font-size:12px;">✏️ Edit</span><span onclick="deleteComment(${postIndex},${commentIndex})" style="cursor:pointer;color:red;font-size:12px;">❌ Delete</span></div>`:''}</div>`;
  });
}
function deleteComment(postIndex, commentIndex) {
  if (!confirm("Delete this comment?")) return;
  const deleted = posts[postIndex].comments[commentIndex]; posts[postIndex].comments.splice(commentIndex,1);
  if (currentUser.commentedPosts) currentUser.commentedPosts = currentUser.commentedPosts.filter(c => !(c.postIndex===postIndex && c.text===deleted.text));
  users[currentUser.email] = currentUser; localStorage.setItem('users',JSON.stringify(users)); localStorage.setItem('posts',JSON.stringify(posts)); updateComments(postIndex);
}
function editComment(postIndex, commentIndex) {
  const box = document.getElementById(`comments-${postIndex}`); if (!box) return;
  const commentDiv = box.children[commentIndex]; const c = posts[postIndex].comments[commentIndex];
  if (commentDiv.querySelector('input')) return;
  const originalText = c.text;
  commentDiv.innerHTML = `<b>${c.user}:</b><input type="text" value="${originalText}" style="width:70%"><button>Save</button><button>Cancel</button>`;
  const input = commentDiv.querySelector('input');
  commentDiv.querySelector('button:first-of-type').onclick = () => {
    const newText = input.value.trim(); if (!newText) return alert("Comment cannot be empty");
    posts[postIndex].comments[commentIndex].text = newText;
    if (currentUser.commentedPosts) { const entry = currentUser.commentedPosts.find(cmt => cmt.postIndex===postIndex && cmt.text===originalText); if (entry) entry.text = newText; }
    users[currentUser.email] = currentUser; localStorage.setItem('users',JSON.stringify(users)); localStorage.setItem('posts',JSON.stringify(posts)); updateComments(postIndex);
  };
  commentDiv.querySelector('button:last-of-type').onclick = () => updateComments(postIndex);
}
function openUserProfile(email) { if (email) renderProfile(email); }

function renderPostBox() {
  const content = document.getElementById('content');
  const box = document.createElement("div"); box.className = "card";
  box.innerHTML = `<textarea id="pText" placeholder="Write something..."></textarea><div class="drag-drop" onclick="document.getElementById('pFile').click()">Click or Drag media</div><input id="pFile" type="file" multiple hidden><div id="preview"></div><button onclick="submitPost()">Post</button>`;
  content.appendChild(box);
  document.getElementById('pFile').onchange = () => {
    const preview = document.getElementById('preview'); preview.innerHTML = "";
    [...document.getElementById('pFile').files].forEach((f, index) => {
      const url = URL.createObjectURL(f);
      if (f.type.startsWith("image")) preview.innerHTML += `<div style="margin-bottom:10px"><label><input type="radio" name="mediaSelect" value="${index}"> Select</label><br><img src="${url}" style="width:100%;border-radius:8px"></div>`;
      else if (f.type.startsWith("video")) preview.innerHTML += `<div style="margin-bottom:10px"><label><input type="radio" name="mediaSelect" value="${index}"> Select</label><br><video src="${url}" controls style="width:100%;border-radius:8px"></video></div>`;
      else if (f.type.startsWith("audio")) preview.innerHTML += `<div style="margin-bottom:10px"><audio src="${url}" controls></audio></div>`;
    });
  };
}
function fileToBase64(file) { return new Promise((resolve,reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = err => reject(err); reader.readAsDataURL(file); }); }
async function submitPost() {
  const pText = document.getElementById('pText'); const pFile = document.getElementById('pFile');
  if (!pText.value && pFile.files.length === 0) { alert("Post must contain text or media"); return; }
  if (!confirm("Publish this post?")) return;
  const selectedRadio = document.querySelector('input[name="mediaSelect"]:checked');
  const selectedIndex = selectedRadio ? Number(selectedRadio.value) : null;
  let media = [];
  for (let i = 0; i < pFile.files.length; i++) {
    const file = pFile.files[i]; const id = crypto.randomUUID();
    const type = file.type.startsWith("image") ? "image" : file.type.startsWith("video") ? "video" : "audio";
    if (type === "video") { await saveMediaToDB(id,file); media.push({type,dbId:id,selected:i===selectedIndex}); }
    else { const base64 = await fileToBase64(file); media.push({type,src:base64,selected:i===selectedIndex}); }
  }
  posts.unshift({ id:crypto.randomUUID(), user:currentUser.name, text:pText.value, media, likes:[], comments:[] });
  localStorage.setItem("posts",JSON.stringify(posts)); renderPosts();
}

function renderInternship() {
  const content = document.getElementById('content'); content.innerHTML = '<h3>Internship Opportunities</h3>';
  if (currentUser.role === 'admin') renderAdminInternPostBox();
  if (adminInternships.length === 0) { content.innerHTML += '<p>No internships available</p>'; return; }
  adminInternships.forEach((intern,i) => {
    currentUser.likedInternships = currentUser.likedInternships || []; currentUser.savedInternships = currentUser.savedInternships || [];
    intern.likes = intern.likes || []; intern.media = intern.media || [];
    const liked = currentUser.likedInternships.includes(i); const saved = currentUser.savedInternships.includes(i);
    const mediaHTML = intern.media.map(m => { if (m.type==='image') return `<img src="${m.src}" width="100%" style="border-radius:8px;margin:5px 0">`; if (m.type==='video') return `<video src="${m.src}" width="100%" controls style="border-radius:8px;margin:5px 0"></video>`; if (m.type==='audio') return `<audio src="${m.src}" controls style="width:100%;margin:5px 0"></audio>`; return ''; }).join('');
    let cardHTML = `<div class="card"><b>${intern.title}</b> at <i>${intern.company}</i><br>${intern.desc}<br>${mediaHTML}<a href="${intern.link}" target="_blank">Apply</a><br><button onclick="toggleUserInternLike(${i})">${liked?'❤️ Liked':'🤍 Like'} (${intern.likes.length})</button><button onclick="toggleUserInternSave(${i})">${saved?'💾 Saved':'💾 Save'}</button>`;

    cardHTML += `</div>`; content.innerHTML += cardHTML;

function renderAdminInternPostBox() {
  if (document.getElementById('adminInternBox')) return;

  dragDrop.ondrop=e=>{e.preventDefault();dragDrop.classList.remove('dragover');const dt=new DataTransfer();for(const file of e.dataTransfer.files)dt.items.add(file);internFile.files=dt.files;showInternPreview();};

async function addInternship() {
  const title=document.getElementById('internTitle').value.trim(); const company=document.getElementById('internCompany').value.trim(); const desc=document.getElementById('internDesc').value.trim(); const link=document.getElementById('internLink').value.trim(); const files=document.getElementById('internFile').files;
  if(!title||!company||!desc||!link){alert("All fields are required");return;}
  let media=[];
  for(const file of files){const base64=await fileToBase64(file);const type=file.type.startsWith("image")?"image":file.type.startsWith("video")?"video":"audio";media.push({type,src:base64});}
  adminInternships.unshift({title,company,desc,link,likes:[],saved:[],media}); localStorage.setItem('adminInternships',JSON.stringify(adminInternships)); renderInternship();
}
function toggleUserInternLike(i){const intern=adminInternships[i];intern.likes=intern.likes||[];currentUser.likedInternships=currentUser.likedInternships||[];const idx=intern.likes.indexOf(currentUser.email);if(idx>-1){intern.likes.splice(idx,1);currentUser.likedInternships=currentUser.likedInternships.filter(x=>x!==i);}else{intern.likes.push(currentUser.email);currentUser.likedInternships.push(i);}users[currentUser.email]=currentUser;localStorage.setItem('users',JSON.stringify(users));localStorage.setItem('adminInternships',JSON.stringify(adminInternships));renderInternship();}
function toggleUserInternSave(i){currentUser.savedInternships=currentUser.savedInternships||[];const idx=currentUser.savedInternships.indexOf(i);if(idx>-1)currentUser.savedInternships.splice(idx,1);else currentUser.savedInternships.push(i);users[currentUser.email]=currentUser;localStorage.setItem('users',JSON.stringify(users));renderInternship();}
function deleteInternship(i){if(confirm("Delete this internship?")){adminInternships.splice(i,1);localStorage.setItem('adminInternships',JSON.stringify(adminInternships));renderInternship();}}

function generateCertificate(){const course=document.getElementById('certCourse').value;const start=document.getElementById('certStart').value;const end=document.getElementById('certEnd').value;if(!course||!start||!end){alert("Fill all fields");return;}const{jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(22);doc.text("Certificate of Completion",20,30);doc.setFontSize(16);doc.text(`This certifies that ${currentUser.name}`,20,50);doc.text(`has successfully completed the course: ${course}`,20,60);doc.text(`Start Date: ${start}`,20,70);doc.text(`End Date: ${end}`,20,80);const qr=new QRious({value:`${currentUser.name} - ${course} (${start} to ${end})`,size:100});doc.addImage(qr.toDataURL(),'PNG',150,20,40,40);document.getElementById('certPreview').innerHTML=`<iframe width="100%" height="300px" src="${doc.output('datauristring')}"></iframe>`;currentUser.certificates=currentUser.certificates||[];currentUser.certificates.push({course,start,end,dataURI:doc.output('datauristring'),date:new Date().toISOString()});users[currentUser.email]=currentUser;localStorage.setItem('users',JSON.stringify(users));alert("Certificate saved to your profile!");}

  if(page==='Liked Contributions'){const liked=currentUser.likedPosts||[];if(liked.length===0)content.innerHTML+='<p>No liked posts</p>';else liked.forEach(i=>{if(posts[i])content.innerHTML+=`<div class="card">${posts[i].text}</div>`;});}

function logout(){localStorage.removeItem('currentUser');location.reload();}

function confirmLogout() {
  if (!confirm("Are you sure you want to logout?")) return;
  const reason = prompt("Please tell us why you are logging out (minimum 30 words):");
  if (!reason) { alert("You must provide a reason to logout."); return; }
  const wordCount = reason.trim().split(/\s+/).length;
  if (wordCount < 30) { alert(`Your reason is too short (${wordCount} words). Please write at least 30 words.`); return; }
  const logoutMessages = JSON.parse(localStorage.getItem('logoutMessages') || '[]');
  logoutMessages.push({ user:currentUser.name, email:currentUser.email, reason, time:new Date().toLocaleString() });
  localStorage.setItem('logoutMessages', JSON.stringify(logoutMessages));
  alert("Thank you for your feedback!");
  logout();
}

function getTodayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function hashCode(str){let h=0;for(let i=0;i<str.length;i++)h=Math.imul(31,h)+str.charCodeAt(i)|0;return Math.abs(h);}
const daySeed=hashCode(getTodayKey());
const todayKey=getTodayKey();
let dailyStatus=JSON.parse(localStorage.getItem("dailyStatus")||"{}");
if(!dailyStatus[todayKey]){dailyStatus[todayKey]={maze:false,hanoi:false,puzzle:false,logic:false,score:0,completed:false};localStorage.setItem("dailyStatus",JSON.stringify(dailyStatus));}

const MAZES=[["S....#",".##..#","...#..","#..##.","...#..","#....E"],["S.#...",".#.#.#",".#...#",".###.#","...#..","#...#E"],["S..#..","##.#.#","..#...",".#.###","...#..","#..#.E"]];

function startGameTimer(){const t=document.getElementById("gameTimer");if(!t)return;timeLeft=60;const interval=setInterval(()=>{timeLeft--;if(t)t.innerText=`${timeLeft}s`;if(timeLeft<=0){clearInterval(interval);if(t)t.innerText="Time up";}},1000);}
function initMaze(){const grid=document.getElementById("mazeGrid");if(!grid)return;grid.innerHTML="";const layout=MAZES[daySeed%MAZES.length];let drawing=false,started=false;for(let r=0;r<layout.length;r++){for(let c=0;c<layout[r].length;c++){const cell=document.createElement("div");cell.className="maze-cell";if(layout[r][c]==="#")cell.classList.add("wall");if(layout[r][c]==="S")cell.classList.add("start");if(layout[r][c]==="E")cell.classList.add("end");cell.addEventListener("mouseenter",()=>{if(drawing&&!cell.classList.contains("wall")){cell.classList.add("path");if(cell.classList.contains("start"))started=true;if(cell.classList.contains("end")&&started){unlockBadge("Maze Master");drawing=false;started=false;}}});grid.appendChild(cell);}}grid.addEventListener("mousedown",e=>{const t=e.target;if(t.classList.contains("maze-cell")&&!t.classList.contains("wall")){drawing=true;if(t.classList.contains("start"))started=true;t.classList.add("path");}});document.addEventListener("mouseup",()=>{drawing=false;started=false;});grid.addEventListener("touchstart",e=>{e.preventDefault();const touch=e.touches[0],elem=document.elementFromPoint(touch.clientX,touch.clientY);if(elem&&elem.classList.contains("maze-cell")&&!elem.classList.contains("wall")){drawing=true;if(elem.classList.contains("start"))started=true;elem.classList.add("path");}},{passive:false});grid.addEventListener("touchmove",e=>{e.preventDefault();const touch=e.touches[0],elem=document.elementFromPoint(touch.clientX,touch.clientY);if(elem&&elem.classList.contains("maze-cell")&&drawing&&!elem.classList.contains("wall")){elem.classList.add("path");if(elem.classList.contains("end")&&started){unlockBadge("Maze Master");drawing=false;started=false;}}},{passive:false});grid.addEventListener("touchend",()=>{drawing=false;started=false;});}
function initPuzzle(){const board=document.getElementById("puzzleBoard");if(!board)return;board.innerHTML="";let order=[0,1,2,3,4,5,6,7,8].sort((a,b)=>hashCode(daySeed+""+a)-hashCode(daySeed+""+b));let selected=null;order.forEach(i=>{const p=document.createElement("div");p.className="piece";p.style.backgroundImage=`url('${PUZZLE_IMAGES[daySeed%PUZZLE_IMAGES.length]}')`;p.style.backgroundPosition=`-${(i%3)*100}px -${Math.floor(i/3)*100}px`;p.onclick=()=>{if(!selected){selected=p;p.style.outline="3px solid red";}else{[p.style.backgroundPosition,selected.style.backgroundPosition]=[selected.style.backgroundPosition,p.style.backgroundPosition];selected.style.outline="";selected=null;const pieces=[...board.children];let solved=true;pieces.forEach((piece,idx)=>{if(piece.style.backgroundPosition!==`-${(idx%3)*100}px -${Math.floor(idx/3)*100}px`)solved=false;});if(solved)unlockBadge("Puzzle Pro");}};board.appendChild(p);});}
function initPathGame(){const grid=document.getElementById("pathGrid");if(!grid)return;grid.innerHTML="";const path=[[0,0],[0,1],[1,1],[2,1],[2,2],[3,2],[4,2],[4,3],[4,4]];for(let r=0;r<5;r++){for(let c=0;c<5;c++){const cell=document.createElement("div");cell.className="maze-cell";cell.style.cssText="width:40px;height:40px;display:inline-block;margin:2px;";cell.onclick=()=>{if(path.some(p=>p[0]===r&&p[1]===c)){cell.classList.add("path");if(r===4&&c===4)unlockBadge("Path Finder");}else cell.style.background="#f44336";};grid.appendChild(cell);}grid.appendChild(document.createElement("br"));}}
function initHanoi(){const hanoi=document.getElementById("hanoi");if(!hanoi)return;hanoi.innerHTML="";const rodElems=[];const diskCount=HANOI_LEVELS[daySeed%HANOI_LEVELS.length];for(let i=0;i<3;i++){const rod=document.createElement("div");rod.className="rod";hanoi.appendChild(rod);rodElems.push(rod);}for(let i=diskCount;i>=1;i--){const disk=document.createElement("div");disk.className="disk";disk.dataset.size=i;disk.style.width=(i*30+40)+"px";disk.style.background=`hsl(${i*70},70%,55%)`;rodElems[0].appendChild(disk);}let movingDisk=null,sourceRod=null,offsetX=0,offsetY=0;hanoi.addEventListener("mousedown",startDrag);hanoi.addEventListener("touchstart",startDrag,{passive:false});hanoi.addEventListener("mousemove",dragMove);hanoi.addEventListener("touchmove",dragMove,{passive:false});document.addEventListener("mouseup",endDrag);document.addEventListener("touchend",endDrag);function startDrag(e){const target=e.target.closest(".disk");if(!target||target!==target.parentElement.lastElementChild)return;e.preventDefault();movingDisk=target;sourceRod=target.parentElement;const rect=target.getBoundingClientRect();const p=e.touches?e.touches[0]:e;offsetX=p.clientX-rect.left;offsetY=p.clientY-rect.top;target.style.position="fixed";target.style.zIndex=1000;moveAt(p.clientX,p.clientY);}function dragMove(e){if(!movingDisk)return;e.preventDefault();const p=e.touches?e.touches[0]:e;moveAt(p.clientX,p.clientY);}function endDrag(e){if(!movingDisk)return;const p=e.changedTouches?e.changedTouches[0]:e;const el=document.elementFromPoint(p.clientX,p.clientY);const targetRod=el?.closest(".rod");let placed=false;if(targetRod){const top=targetRod.lastElementChild;const mSize=Number(movingDisk.dataset.size);const tSize=top?Number(top.dataset.size):Infinity;if(mSize<tSize){targetRod.appendChild(movingDisk);placed=true;}}if(!placed)sourceRod.appendChild(movingDisk);resetDisk();if(rodElems[2].children.length===diskCount){alert("🏆 Tower of Hanoi SOLVED!");unlockBadge("Hanoi Master");}}function moveAt(x,y){movingDisk.style.left=(x-offsetX)+"px";movingDisk.style.top=(y-offsetY)+"px";}function resetDisk(){if(!movingDisk)return;movingDisk.style.position="";movingDisk.style.left="";movingDisk.style.top="";movingDisk.style.zIndex="";movingDisk=null;}}
function unlockBadge(name){if(dailyStatus[todayKey].completed)return;const badgeBox=document.getElementById("badgeBox");if(!badgeBox)return;if(!badgeBox.dataset.shown){badgeBox.innerHTML=`<div class="card">🏅 Daily Challenge Progress</div>`;badgeBox.dataset.shown="true";}badgeBox.innerHTML+=`<div>✔ ${name}</div>`;const map={"Maze Master":"maze","Puzzle Pro":"puzzle","Path Finder":"logic","Hanoi Master":"hanoi"};if(map[name])markGameComplete(map[name]);}
function markGameComplete(game){if(dailyStatus[todayKey].completed)return;dailyStatus[todayKey][game]=true;dailyStatus[todayKey].score+=25;updateScoreUI();checkDailyCompletion();localStorage.setItem("dailyStatus",JSON.stringify(dailyStatus));}
function checkDailyCompletion(){const s=dailyStatus[todayKey];if(s.maze&&s.hanoi&&s.puzzle&&s.logic&&!s.completed){s.completed=true;localStorage.setItem("dailyStatus",JSON.stringify(dailyStatus));showDailyBadge();updateStreak();}}
function showDailyBadge(){if(document.getElementById("dailyBadge"))return;const badge=document.createElement("div");badge.id="dailyBadge";badge.innerHTML=`🏆 <b>Daily Challenge Completed!</b><br>Score: ${dailyStatus[todayKey].score}/100`;badge.style.cssText="position:fixed;top:20%;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#00f2fe,#4facfe);color:#fff;padding:20px 28px;border-radius:14px;font-size:18px;box-shadow:0 0 25px rgba(0,0,0,0.4);z-index:9999;text-align:center;";document.body.appendChild(badge);setTimeout(()=>badge.remove(),4000);}
function updateScoreUI(){const el=document.getElementById("dailyScore");if(el)el.innerText=`🧠 Score: ${dailyStatus[todayKey].score} / 100`;}
function renderScoreHistory(){const box=document.getElementById("scoreHistory");if(!box)return;const data=JSON.parse(localStorage.getItem("dailyStatus")||"{}");const today=new Date();const scores=Object.values(data).map(d=>d.score||0);const bestScore=Math.max(...scores,0);let html="📅 <b>Last 7 days:</b><br>";for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-i);const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;const dayData=data[key];const score=dayData?dayData.score:0;const crown=score===bestScore&&score>0?" 👑":"";const done=dayData?.completed?"✅":"❌";html+=`<div>${key} — ${score}/100 ${done}${crown}</div>`;}box.innerHTML=html;}
function renderScoreChart(){const canvas=document.getElementById("scoreChart");if(!canvas)return;const ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);const data=JSON.parse(localStorage.getItem("dailyStatus")||"{}");const today=new Date();let scores=[];for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);scores.push(data[`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`]?.score||0);}const barW=30,gap=12,baseY=140;scores.forEach((s,i)=>{const h=(s/100)*100;ctx.fillStyle="#4facfe";ctx.fillRect(20+i*(barW+gap),baseY-h,barW,h);ctx.fillStyle="#fff";ctx.font="10px Arial";ctx.fillText(s,24+i*(barW+gap),baseY-h-4);});}
function updateStreak(){const el=document.getElementById("streakBox");if(!el)return;const data=JSON.parse(localStorage.getItem("dailyStatus")||"{}");const days=Object.keys(data).sort((a,b)=>new Date(a)-new Date(b));let run=0,best=0;days.forEach(d=>{if(data[d].completed){run++;best=Math.max(best,run);}else run=0;});el.innerText=`🔥 Streak: ${run} | Best: ${best}`;}
</script>
