<style>

<i class="fas fa-certificate"></i><span>certificate</span></div>

<script>
let mediaDB;
let dbReady = false;

const videoURLCache = {};


const dbReq = indexedDB.open("MediaDB", 1);

dbReq.onupgradeneeded = e => {
    mediaDB = e.target.result;
    mediaDB.createObjectStore("media", { keyPath: "id" });
};

dbReq.onsuccess = e => {
    mediaDB = e.target.result;
    dbReady = true;

    // ✅ Show admin button if admin after DB ready
    if(currentUser && currentUser.role === 'admin') {
        document.getElementById('adminDashBtn').style.display = 'flex';
    }

    // ✅ Open home page if app is active
    if(document.getElementById('appPage').classList.contains('active')) {
        openPage('home');
    }
};
function saveMediaToDB(id, blob) {
    return new Promise(resolve => {
        const tx = mediaDB.transaction("media", "readwrite");
        tx.objectStore("media").put({ id, blob });
        tx.oncomplete = () => resolve();
    });
}

function getMediaFromDB(id) {
    return new Promise(resolve => {
        const tx = mediaDB.transaction("media", "readonly");
        const req = tx.objectStore("media").get(id);
        req.onsuccess = () => resolve(req.result?.blob || null);
    });
}

// ===== USERS & DATA =====
const defaultUsers={"admin@soloskillset.com":{name:"Admin",college:"Soloskillset",email:"admin@soloskillset.com",phone:"9999999999",pass:"Admin@12345",role:"admin",verified:true,followers:[],following:[],certificates:[],savedPosts:[],likedPosts:[],commentedPosts:[]}};
const savedUsers=JSON.parse(localStorage.getItem('users')||'{}');
const users={...savedUsers,...defaultUsers};
let currentUser=null;
let posts=JSON.parse(localStorage.getItem('posts')||'[]');
let adminInternships=JSON.parse(localStorage.getItem('adminInternships')||'[]');

// ===== PAGE SWITCH =====
function showLogin(){document.getElementById('loginPage').classList.add('active');document.getElementById('registerPage').classList.remove('active');}
function showRegister(){document.getElementById('loginPage').classList.remove('active');document.getElementById('registerPage').classList.add('active');}
async function openPage(id)
{

    // Ensure app page is visible
    document.getElementById('appPage').classList.add('active');
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('registerPage').classList.remove('active');

    document.getElementById('content').innerHTML='';
    document.querySelectorAll('nav .icon').forEach(d=>d.classList.remove('active'));
    document.getElementById('nav'+capitalize(id)).classList.add('active');
    if (id === 'home') {
    if (!dbReady) {
        document.getElementById('content').innerHTML =
            '<p>Loading feed...</p>';
        return;
    }
    renderPosts();
}

    if(id==='post') renderPostBox();
    if(id==='certificate') renderCertificate();
    if(id==='profile') renderProfile();
    if(id==='internship') renderInternship();
    if(id === 'adminDashboard'){
    renderAdminDashboard();
    return;
}

}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ===== LOGIN/REGISTER =====
function loginUser(){
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    
    if(users[email] && users[email].pass===pass){
        currentUser = users[email];
        currentUser.education ||= "Add your school / college / company";
currentUser.skills ||= ["HTML","CSS"];
currentUser.certificates ||= ["Add certificate"];
        localStorage.setItem('currentUser', email);
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('appPage').classList.add('active');

        if(currentUser.role==="admin"){
            alert("Admin login successful!");
            document.getElementById('adminDashBtn').style.display = 'flex';
            // Automatically show dashboard first time
            const dashboardShown = localStorage.getItem('adminDashboardShown');
            if(!dashboardShown){
                renderAdminDashboard();
                localStorage.setItem('adminDashboardShown','true');
            }
        } else {
            alert("Login successful!");
            openPage('home');
        }
    } else {
        document.getElementById('loginErr').innerText="Invalid login";
    }
}

function registerUser(){
    const name=document.getElementById('regName').value.trim();
    const college=document.getElementById('regCollege').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const phone=document.getElementById('regPhone').value.trim();
    const pass=document.getElementById('regPass').value.trim();
    if(!/^\S+@\S+\.\S+$/.test(email)){alert("Invalid email"); return;}
    if(!/^\d{10}$/.test(phone)){alert("Invalid phone"); return;}
    if(users[email]){alert("Email already registered"); return;}
    users[email]={
  name,college,email,phone,pass,
  role:"user",
  verified:true,
  followers:[],
  following:[],
  certificates:[],
  savedPosts:[],
  likedPosts:[],
  commentedPosts:[],
  education: college,
  skills: []
};

    localStorage.setItem('users',JSON.stringify(users));
    alert("Registered successfully! You can login immediately.");
    showLogin();
}

// ===== HOME / POSTS =====
async function  renderPosts()
{
    const content = document.getElementById('content');
    content.innerHTML = '<h3>Home Feed</h3><div id="feed"></div>';


    if (posts.length === 0) {
        content.innerHTML += '<p>No posts yet</p>';
        return;
    }

    for (let i = 0; i < posts.length; i++) {
        const p = posts[i];
        const liked = currentUser.likedPosts?.includes(i);
        const saved = currentUser.savedPosts?.includes(i);

        let mediaHTML = '';
        for (const m of p.media || []) {
            if (m.type === "image") mediaHTML += `<img src="${m.src}" width="100%" style="border-radius:8px;margin:5px 0">`;
            if (m.type === "audio") mediaHTML += `<audio src="${m.src}" controls style="width:100%;margin:5px 0"></audio>`;
            if (m.type === "video") {
                const blob = await getMediaFromDB(m.dbId);
                if (blob) {
                    if (!videoURLCache[m.dbId]) {
    videoURLCache[m.dbId] = URL.createObjectURL(blob);
}
const url = videoURLCache[m.dbId];

                    mediaHTML += `<video src="${url}" controls playsinline preload="metadata" width="100%" style="border-radius:8px;margin:5px 0"></video>`;
                }
            }
        }

        let commentsHTML = '';
p.comments?.forEach((c, commentIndex) => {
    const isOwner = c.email === currentUser.email;
    commentsHTML += `
        <div style="margin-left:10px;font-size:13px;color:#555;display:flex;justify-content:space-between;align-items:center;" id="comment-${i}-${commentIndex}">
            <div><b>${c.user}:</b> ${c.text}</div>
            ${isOwner ? `
                <div style="display:flex;gap:6px;">
                    <span onclick="editComment(${i}, ${commentIndex})" style="cursor:pointer;color:blue;font-size:12px;">✏️ Edit</span>
                    <span onclick="deleteComment(${i}, ${commentIndex})" style="cursor:pointer;color:red;font-size:12px;">❌ Delete</span>
                </div>
            ` : ''}
        </div>
    `;
});
  const postUser = Object.values(users).find(u => u.name === p.user);

content.innerHTML += `
<div class="card" id="post-${i}">

  <!-- POST HEADER -->
  <div class="post-header"
       onclick="openUserProfile('${postUser?.email}')">

    <img src="${postUser?.dp || 'https://via.placeholder.com/40'}">
    <span class="post-username">${p.user}</span>

  </div>

  <!-- POST CONTENT -->
  <div>${p.text}</div>


    <div id="media-${i}">
        ${mediaHTML}
    </div>

    <div id="actions-${i}"></div>
    <div id="comments-${i}">${commentsHTML}</div>
</div>`;

// ✅ Update post actions
updatePostActions(i); 
// ✅ Update comments so Edit/Delete always works
updateComments(i);

    }
}
function updatePostActions(i){
    const p = posts[i];
    const liked = currentUser.likedPosts?.includes(i);
    const saved = currentUser.savedPosts?.includes(i);

    const box = document.getElementById(`actions-${i}`);
    if(!box) return;

    box.innerHTML = `
        <button onclick="toggleLike(${i})">
            ${liked ? '❤️ Liked' : '🤍 Like'} (${p.likes.length})
        </button>
        <button onclick="addComment(${i})">Comment</button>
        <button onclick="savePost(${i})">
            ${saved ? 'Unsave' : 'Save'}
        </button>
    `;
}

// ===== ACTIONS =====
function toggleLike(i){
    posts[i].likes = posts[i].likes || [];
    currentUser.likedPosts = currentUser.likedPosts || [];
    const idx = posts[i].likes.indexOf(currentUser.email);
    if(idx > -1){
        posts[i].likes.splice(idx,1);
        currentUser.likedPosts = currentUser.likedPosts.filter(p => p !== i);
    } else {
        posts[i].likes.push(currentUser.email);
        currentUser.likedPosts.push(i);
    }
    users[currentUser.email] = currentUser;
    localStorage.setItem("users",JSON.stringify(users));
    localStorage.setItem("posts",JSON.stringify(posts));
    updatePostActions(i); // ✅ Update only this post
}

function savePost(i){
    currentUser.savedPosts = currentUser.savedPosts || [];
    const idx = currentUser.savedPosts.indexOf(i);
    if(idx>-1) currentUser.savedPosts.splice(idx,1);
    else currentUser.savedPosts.push(i);
    users[currentUser.email] = currentUser;
    localStorage.setItem("users",JSON.stringify(users));
    updatePostActions(i); // ✅ Update only this post
}

// Add a comment
function addComment(postIndex, text) {
    if(!text) {
        text = prompt("Enter comment:");
        if(!text) return;
    }

    const comment = {
        user: currentUser.name,
        email: currentUser.email,
        text: text
    };

    posts[postIndex].comments = posts[postIndex].comments || [];
    posts[postIndex].comments.push(comment);

    currentUser.commentedPosts = currentUser.commentedPosts || [];
    currentUser.commentedPosts.push({
        postIndex: postIndex,
        text: text
    });

    users[currentUser.email] = currentUser;
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('posts', JSON.stringify(posts));

    updateComments(postIndex);
}

// Update comment display with edit option
function updateComments(postIndex) {
    const box = document.getElementById(`comments-${postIndex}`);
    if(!box) return;

    box.innerHTML = '';

    posts[postIndex].comments.forEach((c, commentIndex) => {
        const isOwner = c.email === currentUser.email;

        box.innerHTML += `
            <div style="margin-left:10px;font-size:13px;color:#555;display:flex;justify-content:space-between;align-items:center;">
                <div><b>${c.user}:</b> ${c.text}</div>
                ${isOwner ? `
                    <div style="display:flex;gap:6px;">
                        <span onclick="editComment(${postIndex}, ${commentIndex})" style="cursor:pointer;color:blue;font-size:12px;">✏️ Edit</span>
                        <span onclick="deleteComment(${postIndex}, ${commentIndex})" style="cursor:pointer;color:red;font-size:12px;">❌ Delete</span>
                    </div>
                ` : ''}
            </div>
        `;
    });
}

// Delete comment
function deleteComment(postIndex, commentIndex){
    if(!confirm("Delete this comment?")) return;

    const deletedComment = posts[postIndex].comments[commentIndex];

    posts[postIndex].comments.splice(commentIndex, 1);

    if(currentUser.commentedPosts){
        currentUser.commentedPosts = currentUser.commentedPosts.filter(c =>
            !(c.postIndex === postIndex && c.text === deletedComment.text)
        );
    }

    users[currentUser.email] = currentUser;
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('posts', JSON.stringify(posts));

    updateComments(postIndex);
}

// Inline edit comment
function editComment(postIndex, commentIndex){
    const box = document.getElementById(`comments-${postIndex}`);
    if(!box) return;

    const commentDiv = box.children[commentIndex];
    const c = posts[postIndex].comments[commentIndex];

    // Prevent multiple edits at once
    if(commentDiv.querySelector('input')) return;

    const originalText = c.text;

    commentDiv.innerHTML = `
        <b>${c.user}:</b>
        <input type="text" value="${originalText}" style="width:70%">
        <button>Save</button>
        <button>Cancel</button>
    `;

    const input = commentDiv.querySelector('input');
    const saveBtn = commentDiv.querySelector('button:first-of-type');
    const cancelBtn = commentDiv.querySelector('button:last-of-type');

    saveBtn.onclick = () => {
        const newText = input.value.trim();
        if(!newText) return alert("Comment cannot be empty");

        // Update post comment
        posts[postIndex].comments[commentIndex].text = newText;

        // Update user commentedPosts
        if(currentUser.commentedPosts){
            const commentEntry = currentUser.commentedPosts.find(cmt => 
                cmt.postIndex === postIndex && cmt.text === originalText
            );
            if(commentEntry) commentEntry.text = newText;
        }

        users[currentUser.email] = currentUser;
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('posts', JSON.stringify(posts));

        updateComments(postIndex); // re-render comments
    };

    cancelBtn.onclick = () => {
        updateComments(postIndex); // restore original
    };
}

async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = err => reject(err);
        reader.readAsDataURL(file);
    });
}

async function submitPost() {
    if (!pText.value && pFile.files.length === 0) {
        alert("Post must contain text or media");
        return;
    }
    
    if (!confirm("Publish this post?")) return;

    const selectedRadio = document.querySelector('input[name="mediaSelect"]:checked');
    const selectedIndex = selectedRadio ? Number(selectedRadio.value) : null;

    let media = [];

    // ✅ THIS IS WHERE YOUR CODE GOES
    for (let i = 0; i < pFile.files.length; i++) {
        const file = pFile.files[i];
        const id = crypto.randomUUID();

        let type = file.type.startsWith("image")
            ? "image"
            : file.type.startsWith("video")
            ? "video"
            : "audio";

        if (type === "video") {
            await saveMediaToDB(id, file);
            media.push({
                type,
                dbId: id,
                selected: i === selectedIndex
            });
        } else {
            const base64 = await fileToBase64(file);
            media.push({
                type,
                src: base64,
                selected: i === selectedIndex
            });
        }
    }
posts.unshift({

function toggleUserInternLike(i){

    if(idx > -1){ intern.likes.splice(idx,1); currentUser.likedInternships = currentUser.likedInternships.filter(x=>x!==i); }

    users[currentUser.email] = currentUser;

  const reader = new FileReader();
  reader.onload = () => {
    currentUser.dp = reader.result;
    users[currentUser.email] = currentUser;
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", currentUser.email);

    renderProfile();
  };
  reader.readAsDataURL(file);
}

function getTodayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function hashCode(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31,h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

const MAZES = [
  [
    "S....#",
    ".##..#",
    "...#..",
    "#..##.",
    "...#..",
    "#....E"
  ],
  [
    "S.#...",
    ".#.#.#",
    ".#...#",
    ".###.#",
    "...#..",
    "#...#E"
  ],
  [
    "S..#..",
    "##.#.#",
    "..#...",
    ".#.###",
    "...#..",
    "#..#.E"
  ]
];

function initMaze(){
    const grid = document.getElementById("mazeGrid");
    grid.innerHTML = "";

    const layout = MAZES[daySeed % MAZES.length];
    
    let drawing = false;
    let started = false;

    const rows = layout.length;
    const cols = layout[0].length;

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const cell = document.createElement("div");
            cell.className = "maze-cell";

            if(layout[r][c]==="#") cell.classList.add("wall");
            if(layout[r][c]==="S") cell.classList.add("start");
            if(layout[r][c]==="E") cell.classList.add("end");

            cell.dataset.r = r;
            cell.dataset.c = c;

            // Highlight on drag
            cell.addEventListener("mouseenter", e=>{
                if(drawing && !cell.classList.contains("wall")){
                    cell.classList.add("path");
                    if(cell.classList.contains("start")) started = true;
                    if(cell.classList.contains("end") && started){
                        unlockBadge("Maze Master");
                        drawing = false;
                        started = false;
                    }
                }
            });

            grid.appendChild(cell);
        }
    }

    // Start drawing when mouse pressed
    grid.addEventListener("mousedown", e=>{
        const target = e.target;
        if(target.classList.contains("maze-cell") && !target.classList.contains("wall")){
            drawing = true;
            if(target.classList.contains("start")) started = true;
            target.classList.add("path");
        }
    });

    // Stop drawing when mouse released anywhere
    document.addEventListener("mouseup", ()=>{
        drawing = false;
        started = false;
    });

    // Optional: track touch events for mobile
    grid.addEventListener("touchstart", e=>{
        e.preventDefault();
        const touch = e.touches[0];
        const elem = document.elementFromPoint(touch.clientX, touch.clientY);
        if(elem && elem.classList.contains("maze-cell") && !elem.classList.contains("wall")){
            drawing = true;
            if(elem.classList.contains("start")) started = true;
            elem.classList.add("path");
        }
    }, {passive:false});

    grid.addEventListener("touchmove", e=>{
        e.preventDefault();
        const touch = e.touches[0];
        const elem = document.elementFromPoint(touch.clientX, touch.clientY);
        if(elem && elem.classList.contains("maze-cell") && drawing && !elem.classList.contains("wall")){
            elem.classList.add("path");
            if(elem.classList.contains("end") && started){
                unlockBadge("Maze Master");
                drawing = false;
                started = false;
            }
        }
    }, {passive:false});

    grid.addEventListener("touchend", e=>{
        drawing = false;
        started = false;
    });
}

function initPuzzle(){
  const board=document.getElementById("puzzleBoard");
  board.innerHTML="";

  let order=[0,1,2,3,4,5,6,7,8]
  .sort((a,b)=> hashCode(daySeed + "" + a) - hashCode(daySeed + "" + b));

  let selected=null;

  order.forEach(i=>{
    const p=document.createElement("div");
    p.className="piece";
p.style.backgroundImage =
  `url('${PUZZLE_IMAGES[daySeed % PUZZLE_IMAGES.length]}')`;

    p.style.backgroundPosition=`${-(i%3)*100}px ${-Math.floor(i/3)*100}px`;

    p.onclick=()=>{
      if(!selected){
        selected=p; 
        p.style.outline="3px solid red"; 
      } else {
        // Swap positions
        [p.style.backgroundPosition, selected.style.backgroundPosition] = 
        [selected.style.backgroundPosition, p.style.backgroundPosition];
        selected.style.outline=""; // remove highlight
        selected=null;

        // Check if solved
        const pieces = [...board.children];
        let solved=true;
        pieces.forEach((piece, idx)=>{
          const correctPos = `-${(idx%3)*100}px -${Math.floor(idx/3)*100}px`;
          if(piece.style.backgroundPosition !== correctPos) solved=false;
        });
        if(solved) unlockBadge("Puzzle Pro");
      }
    };

    board.appendChild(p);
  });
}

const HANOI_LEVELS = [3, 4, 5];

function initHanoi() {
    const hanoi = document.getElementById("hanoi");
    hanoi.innerHTML = "";
    
    const rodElems = [];
const diskCount = HANOI_LEVELS[daySeed % HANOI_LEVELS.length];

    
    // Create rods
    for (let i = 0; i < 3; i++) {
        const rod = document.createElement("div");
        rod.className = "rod";
        hanoi.appendChild(rod);
        rodElems.push(rod);
    }
    
    // Create disks ONLY on first rod (unsolved)
    for (let i = diskCount; i >= 1; i--) {
        const disk = document.createElement("div");
        disk.className = "disk";
        disk.dataset.size = i;
        disk.style.width = (i * 30 + 40) + "px";
        disk.style.background = `hsl(${i * 70},70%,55%)`;
        rodElems[0].appendChild(disk);
    }
    
    let movingDisk = null;
    let sourceRod = null;
    let offsetX = 0,
        offsetY = 0;
    
    // ===== TOUCH + MOUSE DRAG =====
    hanoi.addEventListener("mousedown", startDrag);
    hanoi.addEventListener("touchstart", startDrag, { passive: false });
    
    hanoi.addEventListener("mousemove", dragMove);
    hanoi.addEventListener("touchmove", dragMove, { passive: false });
    
    document.addEventListener("mouseup", endDrag);
    document.addEventListener("touchend", endDrag);
    
    function startDrag(e) {
        const target = e.target.closest(".disk");
        if (!target) return;
        
        const parentRod = target.parentElement;
        
        // ❗ ONLY TOP DISK CAN MOVE
        if (target !== parentRod.lastElementChild) return;
        
        e.preventDefault();
        movingDisk = target;
        sourceRod = parentRod;
        
        const rect = target.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        
        offsetX = p.clientX - rect.left;
        offsetY = p.clientY - rect.top;
        
        target.style.position = "absolute";
        target.style.zIndex = 1000;
        moveAt(p.clientX, p.clientY);
    }
    
    function dragMove(e) {
        if (!movingDisk) return;
        e.preventDefault();
        const p = e.touches ? e.touches[0] : e;
        moveAt(p.clientX, p.clientY);
    }
    
    function endDrag(e) {
        if (!movingDisk) return;
        
        const p = e.changedTouches ? e.changedTouches[0] : e;
        const el = document.elementFromPoint(p.clientX, p.clientY);
        const targetRod = el?.closest(".rod");
        
        let placed = false;
        
        if (targetRod) {
            const top = targetRod.lastElementChild;
            const mSize = Number(movingDisk.dataset.size);
            const tSize = top ? Number(top.dataset.size) : Infinity;
            
            if (mSize < tSize) {
                targetRod.appendChild(movingDisk);
                placed = true;
            }
        }
        
        // ❌ INVALID MOVE → RETURN
        if (!placed) {
            sourceRod.appendChild(movingDisk);
        }
        
        resetDisk();
        checkSolved();
    }
    
    function moveAt(x, y) {
        movingDisk.style.left = (x - offsetX) + "px";
        movingDisk.style.top = (y - offsetY) + "px";
    }
    
    function resetDisk() {
        movingDisk.style.position = "";
        movingDisk.style.left = "";
        movingDisk.style.top = "";
        movingDisk.style.zIndex = "";
        movingDisk = null;
    }
    
    function checkSolved() {
        if (rodElems[2].children.length === diskCount) {
            alert("🏆 Tower of Hanoi SOLVED!");
            unlockBadge("Hanoi Master");
        }
    }
}

function unlockBadge(name){

  const badgeBox = document.getElementById("badgeBox");
  if (!badgeBox.dataset.shown) {
    badgeBox.innerHTML = `<div class="card">🏅 Daily Challenge Progress</div>`;
    badgeBox.dataset.shown = "true"; // ✅ single combined badge
  }

  badgeBox.innerHTML += `<div>✔ ${name}</div>`;

  // 🔗 map badge → game
  const map = {
    "Maze Master": "maze",
    "Puzzle Pro": "puzzle",
    "Path Finder": "logic",
    "Hanoi Master": "hanoi"
  };

  if (map[name]) {
    markGameComplete(map[name]);
  }
}

    const dayData = data[key];

const bestScore = Math.max(...scores,0);

const score = dayData ? dayData.score : 0;
const crown = score === bestScore && score > 0 ? " 👑" : "";

    html += `

function renderScoreChart(){
  const canvas = document.getElementById("scoreChart");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const data = JSON.parse(localStorage.getItem("dailyStatus") || "{}");
  const today = new Date();

  let scores = [];

  for(let i=6;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    scores.push(data[key]?.score || 0);
  }

  const max = 100;
  const barW = 30;
  const gap = 12;
  const baseY = 140;

  scores.forEach((s,i)=>{
    const h = (s/max)*100;
    ctx.fillStyle = "#4facfe";
    ctx.fillRect(20+i*(barW+gap), baseY-h, barW, h);

    ctx.fillStyle = "#fff";
    ctx.font = "10px Arial";
    ctx.fillText(s, 24+i*(barW+gap), baseY-h-4);
  });
}
function updateStreak(){
  const el = document.getElementById("streakBox");
  if (!el) return;

  const data = JSON.parse(localStorage.getItem("dailyStatus") || {});
  const days = Object.keys(data).sort((a,b)=>new Date(a)-new Date(b));

  let current = 0, best = 0, run = 0;

  days.forEach(d=>{
    if (data[d].completed){
      run++;
      best = Math.max(best, run);
    } else {
      run = 0;
    }
  });

  current = run;
  el.innerText = `🔥 Streak: ${current} | Best: ${best}`;
}

    toggle.innerText = "🌙";
    localStorage.setItem("theme", "light");
  }
}
